<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/sword5.jpg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap">
  <title>Custom Order — Rory's Bronze Factory</title>
  <style>
    * { cursor: url('images/cursor-sword.svg') 5 5, auto !important; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    h1, h2, h3, h4, h5, h6, header {
      font-family: 'Cinzel', serif;
    }

    .container {
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .back {
      text-decoration: none;
      color: blue;
    }

    .cart-link {
      text-decoration: none;
      color: #333;
      font-size: 16px;
    }

    .cart-link:hover { color: #000; }

    .form-card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .form-card h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .form-card p.subtitle {
      color: #666;
      margin-top: 0;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 15px;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      background-color: #fafafa;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: #7a4e00;
      outline: none;
      background-color: #fff;
    }

    textarea.medium {
      height: 80px;
      resize: vertical;
    }

    textarea.large {
      height: 200px;
      resize: vertical;
    }

    button[type="submit"] {
      background-color: #7a4e00;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    button[type="submit"]:hover {
      background-color: #9a6600;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-bar">
    <a href="index.html" class="back">← Back to Shop</a>
    <a href="checkout.html" class="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
  </div>

  <div class="form-card">
    <h1>Custom Order</h1>
    <p class="subtitle">Fill out the form below and we'll get back to you about your custom request.</p>

    <!-- Replace YOUR_FORM_ID below with your Formspree endpoint after signing up at formspree.io -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" class="medium" placeholder="Street, City, State, ZIP" required></textarea>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="material">Item Material</label>
        <select id="material" name="material" required>
          <option value="" disabled selected>Select a material…</option>
          <option value="Bronze">Bronze</option>
          <option value="Aluminum">Aluminum</option>
          <option value="Copper">Copper</option>
          <option value="Silver">Silver</option>
          <option value="Resin">Resin</option>
          <option value="Concrete">Concrete</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" placeholder="1" required>
      </div>

      <div class="form-group">
        <label for="description">Product Description</label>
        <textarea id="description" name="description" class="large" placeholder="Describe your custom order in as much detail as possible — dimensions, design, intended use, reference images, etc." required></textarea>
      </div>

      <button type="submit">Submit Custom Order</button>
    </form>
  </div>
</div>

<script src="cart.js"></script>
<script>
  document.getElementById('cart-count').textContent = getCart().length;
</script>
<script src="cursor.js"></script>
</body>
</html>
